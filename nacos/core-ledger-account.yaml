server:
  port: 8081
  servlet:
    context-path: /account

spring:
  application:
    name: core-ledger-account

management:
  endpoints:
    web:
      exposure:
        include: '*'
  metrics:
    tags:
      application: core-ledger-account
    export:
      prometheus:
        enabled: true
        step: 1m

logging:
  level:
    root: INFO
    com.bank.core: DEBUG

    org.apache.shardingsphere: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

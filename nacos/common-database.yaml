spring:
  shardingsphere:
    datasource:
      names: ds0,ds1
      ds0:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://mysql:3306/core_ledger_0?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: root123
        hikari:
          minimum-idle: 5
          maximum-pool-size: 20
          idle-timeout: 30000
          connection-timeout: 30000
      ds1:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://mysql:3306/core_ledger_1?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: root123
        hikari:
          minimum-idle: 5
          maximum-pool-size: 20
          idle-timeout: 30000
          connection-timeout: 30000
    rules:
      sharding:
        tables:
          t_account:
            actual-data-nodes: ds$->{0..1}.t_account
            database-strategy:
              standard:
                sharding-column: account_id
                sharding-algorithm-name: account-id-hash
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
          t_account_shard:
            actual-data-nodes: ds$->{0..1}.t_account_shard
            database-strategy:
              standard:
                sharding-column: main_account_id
                sharding-algorithm-name: account-id-hash
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
          t_account_buffer_log:
            actual-data-nodes: ds$->{0..1}.t_account_buffer_log
            database-strategy:
              standard:
                sharding-column: account_id
                sharding-algorithm-name: account-id-hash
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
          t_account_freeze_log:
            actual-data-nodes: ds$->{0..1}.t_account_freeze_log_$->{0..3}
            database-strategy:
              standard:
                sharding-column: account_id
                sharding-algorithm-name: account-id-hash
            table-strategy:
              standard:
                sharding-column: account_id
                sharding-algorithm-name: freeze-log-hash
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
          t_transaction:
            actual-data-nodes: ds$->{0..1}.t_transaction_2025$->{01..12},ds$->{0..1}.t_transaction_2026$->{01..12}
            database-strategy:
              complex:
                sharding-columns: account_id,transaction_time
                sharding-algorithm-name: transaction-complex-db
            table-strategy:
              standard:
                sharding-column: transaction_time
                sharding-algorithm-name: transaction-time-month
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
          t_transaction_entry:
            actual-data-nodes: ds$->{0..1}.t_transaction_entry_2025$->{01..12},ds$->{0..1}.t_transaction_entry_2026$->{01..12}
            database-strategy:
              complex:
                sharding-columns: account_id,create_time
                sharding-algorithm-name: transaction-complex-db
            table-strategy:
              standard:
                sharding-column: create_time
                sharding-algorithm-name: transaction-entry-time-month
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
        sharding-algorithms:
          account-id-hash:
            type: ACCOUNT_ID_HASH
            props:
              database-count: 2
          freeze-log-hash:
            type: INLINE
            props:
              algorithm-expression: t_account_freeze_log_$->{Math.abs(account_id.hashCode()) % 4}
          transaction-complex-db:
            type: TRANSACTION_COMPLEX
            props:
              database-count: 2
          transaction-time-month:
            type: TRANSACTION_TIME_MONTH
          transaction-entry-time-month:
            type: TRANSACTION_TIME_MONTH
        key-generators:
          snowflake:
            type: SNOWFLAKE
            props:
              worker-id: ${sharding.snowflake.worker-id:1}
              max-vibration-offset: 1
    props:
      sql-show: true
      check-table-metadata-enabled: false

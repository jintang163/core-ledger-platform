server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /account

spring:
  main:
    allow-bean-definition-overriding: true

dubbo:
  registry:
    address: nacos://${NACOS_SERVER:127.0.0.1:8848}
    group: CORE_LEDGER_GROUP
  protocol:
    name: dubbo
    port: ${DUBBO_PORT:20881}
  consumer:
    timeout: 5000
    retries: 0
  provider:
    timeout: 5000
    retries: 0

seata:
  enabled: true
  application-id: core-ledger-account
  tx-service-group: account-tx-group
  service:
    vgroup-mapping:
      account-tx-group: default
    grouplist:
      default: ${SEATA_SERVER:127.0.0.1:8091}
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      namespace: ${NACOS_NAMESPACE:public}
      group: SEATA_GROUP
      cluster: default
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      namespace: ${NACOS_NAMESPACE:public}
      group: SEATA_GROUP

management:
  endpoints:
    web:
      exposure:
        include: '*'
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
        step: 1m

logging:
  level:
    root: INFO
    com.bank.core: DEBUG
    io.seata: DEBUG
    org.apache.shardingsphere: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

spring:
  application:
    name: core-ledger-account
  main:
    allow-bean-definition-overriding: true
  sleuth:
    enabled: true
    sampler:
      probability: 1.0
    web:
      skip-pattern: (^/actuator.*|^/swagger.*|^/v2/api-docs.*|^/doc.html.*)
    async:
      enabled: true
    scheduled:
      enabled: true
    log:
      slf4j:
        whitelisted-mdc-keys: traceId,spanId,transactionId,globalTxId

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /account

dubbo:
  registry:
    address: nacos://${NACOS_SERVER:127.0.0.1:8848}
    group: CORE_LEDGER_GROUP
  protocol:
    name: dubbo
    port: ${DUBBO_PORT:20881}
  consumer:
    timeout: 5000
    retries: 0
  provider:
    timeout: 5000
    retries: 0

seata:
  enabled: true
  application-id: core-ledger-account
  tx-service-group: ${seata.tx-service-group:account-tx-group}
  service:
    vgroup-mapping:
      account-tx-group: default
    grouplist:
      default: ${SEATA_SERVER:127.0.0.1:8091}
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      group: SEATA_GROUP
      namespace: public
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      group: SEATA_GROUP
      namespace: public
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

management:
  endpoints:
    web:
      exposure:
        include: '*'
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
        step: 1m
    web:
      server:
        request:
          autotime:
            enabled: true
            percentiles: 0.5, 0.9, 0.95, 0.99

skywalking:
  plugin:
    seata:
      enabled: true
    dubbo:
      enabled: true
    springmvc:
      enabled: true
    mybatis:
      enabled: true

logging:
  level:
    root: INFO
    com.bank.core: DEBUG
    org.apache.shardingsphere: INFO
    org.springframework.cloud.sleuth: DEBUG
    brave: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} [traceId=%X{traceId:-}, spanId=%X{spanId:-}, txId=%X{transactionId:-}, gTxId=%X{globalTxId:-}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} [traceId=%X{traceId:-}, spanId=%X{spanId:-}, txId=%X{transactionId:-}, gTxId=%X{globalTxId:-}] - %msg%n"

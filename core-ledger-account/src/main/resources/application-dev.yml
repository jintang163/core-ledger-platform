spring:
  shardingsphere:
    datasource:
      names: ds0,ds1
      ds0:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/core_ledger_0?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
        username: ${MYSQL_USER:root}
        password: ${MYSQL_PASSWORD:root}
        hikari:
          minimum-idle: 5
          maximum-pool-size: 20
          idle-timeout: 30000
          connection-timeout: 30000
      ds1:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/core_ledger_1?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
        username: ${MYSQL_USER:root}
        password: ${MYSQL_PASSWORD:root}
        hikari:
          minimum-idle: 5
          maximum-pool-size: 20
          idle-timeout: 30000
          connection-timeout: 30000
    rules:
      sharding:
        tables:
          t_account:
            actual-data-nodes: ds$->{0..1}.t_account
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: database-inline
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
          t_account_freeze_log:
            actual-data-nodes: ds$->{0..1}.t_account_freeze_log_$->{0..3}
            database-strategy:
              standard:
                sharding-column: account_id
                sharding-algorithm-name: database-inline-account
            table-strategy:
              standard:
                sharding-column: account_id
                sharding-algorithm-name: freeze-log-inline
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
          t_transaction:
            actual-data-nodes: ds$->{0..1}.t_transaction_$->{0..3}
            database-strategy:
              standard:
                sharding-column: transaction_id
                sharding-algorithm-name: database-inline-tx
            table-strategy:
              standard:
                sharding-column: transaction_id
                sharding-algorithm-name: transaction-inline
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
          t_transaction_entry:
            actual-data-nodes: ds$->{0..1}.t_transaction_entry_$->{0..3}
            database-strategy:
              standard:
                sharding-column: transaction_id
                sharding-algorithm-name: database-inline-tx
            table-strategy:
              standard:
                sharding-column: transaction_id
                sharding-algorithm-name: transaction-entry-inline
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
        sharding-algorithms:
          database-inline:
            type: INLINE
            props:
              algorithm-expression: ds$->{Math.abs(user_id.hashCode()) % 2}
          database-inline-account:
            type: INLINE
            props:
              algorithm-expression: ds$->{Math.abs(account_id.hashCode()) % 2}
          database-inline-tx:
            type: INLINE
            props:
              algorithm-expression: ds$->{Math.abs(transaction_id.hashCode()) % 2}
          freeze-log-inline:
            type: INLINE
            props:
              algorithm-expression: t_account_freeze_log_$->{Math.abs(account_id.hashCode()) % 4}
          transaction-inline:
            type: INLINE
            props:
              algorithm-expression: t_transaction_$->{Math.abs(transaction_id.hashCode()) % 4}
          transaction-entry-inline:
            type: INLINE
            props:
              algorithm-expression: t_transaction_entry_$->{Math.abs(transaction_id.hashCode()) % 4}
        key-generators:
          snowflake:
            type: SNOWFLAKE
            props:
              worker-id: 1
    props:
      sql-show: false

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:127.0.0.1:9876}
  producer:
    group: account-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
